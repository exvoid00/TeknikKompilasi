<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="0.6" stop-color="#10182A"/>
      <stop offset="1" stop-color="#0A2A22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3FB950"/>
      <stop offset="1" stop-color="#58A6FF"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1130" cy="120" r="230" fill="#3FB950" opacity="0.10"/>
  <circle cx="120" cy="650" r="180" fill="#58A6FF" opacity="0.10"/>
  <rect x="0" y="0" width="1280" height="10" fill="url(#accent)"/>

  <!-- LEFT: teks -->
  <g>
    <!-- chip mata kuliah -->
    <rect x="80" y="92" rx="22" ry="22" width="380" height="46" fill="#3FB950" opacity="0.16"/>
    <rect x="80" y="92" rx="22" ry="22" width="380" height="46" fill="none" stroke="#3FB950" stroke-width="1.5"/>
    <text x="104" y="123" fill="#7EE787" font-size="21" font-weight="700" letter-spacing="1.5">TUGAS TEKNIK KOMPILASI</text>

    <!-- judul -->
    <text x="76" y="250" fill="#FFFFFF" font-size="96" font-weight="800" letter-spacing="1">MINI</text>
    <text x="76" y="348" fill="#58A6FF" font-size="96" font-weight="800" letter-spacing="1">COMPILER</text>

    <!-- subjudul -->
    <text x="80" y="410" fill="#C9D1D9" font-size="32" font-weight="600">Bahasa Pemrograman Daerah</text>
    <text x="80" y="452" fill="#7EE787" font-size="40" font-weight="800">~ Bahaso MINANG ~</text>

    <!-- pipeline 6 tahap -->
    <g font-size="17" font-weight="700">
      <rect x="80"  y="490" rx="10" width="92"  height="40" fill="#21262D" stroke="#30363D"/>
      <text x="126" y="516" fill="#7EE787" text-anchor="middle">Lexer</text>
      <text x="182" y="516" fill="#8B949E" text-anchor="middle">›</text>
      <rect x="196" y="490" rx="10" width="100" height="40" fill="#21262D" stroke="#30363D"/>
      <text x="246" y="516" fill="#7EE787" text-anchor="middle">Parser</text>
      <text x="306" y="516" fill="#8B949E" text-anchor="middle">›</text>
      <rect x="320" y="490" rx="10" width="80"  height="40" fill="#21262D" stroke="#30363D"/>
      <text x="360" y="516" fill="#7EE787" text-anchor="middle">AST</text>
      <text x="410" y="516" fill="#8B949E" text-anchor="middle">›</text>
      <rect x="424" y="490" rx="10" width="150" height="40" fill="#21262D" stroke="#30363D"/>
      <text x="499" y="516" fill="#7EE787" text-anchor="middle">Code Gen</text>
    </g>

    <!-- badge bahasa -->
    <g font-size="22" font-weight="700">
      <rect x="80"  y="556" rx="12" width="130" height="50" fill="#306998"/>
      <text x="145" y="588" fill="#FFD43B" text-anchor="middle">Python</text>
      <rect x="226" y="556" rx="12" width="240" height="50" fill="#1F6F43"/>
      <text x="346" y="588" fill="#FFFFFF" text-anchor="middle">Three-Address Code</text>
    </g>
  </g>

  <!-- RIGHT: jendela terminal kode Minang -->
  <g filter="url(#sh)">
    <rect x="800" y="180" rx="14" ry="14" width="410" height="360" fill="#161B22" stroke="#30363D"/>
    <rect x="800" y="180" rx="14" ry="14" width="410" height="46" fill="#0D1117"/>
    <circle cx="826" cy="203" r="7" fill="#FF5F56"/>
    <circle cx="850" cy="203" r="7" fill="#FFBD2E"/>
    <circle cx="874" cy="203" r="7" fill="#27C93F"/>
    <text x="1010" y="209" fill="#8B949E" font-size="16" font-family="Consolas, monospace" text-anchor="middle">contoh.mng</text>

    <g font-family="Consolas, monospace" font-size="22">
      <text x="824" y="268" fill="#FF7B72">bulek</text>
      <text x="906" y="268" fill="#C9D1D9">a = 2;</text>

      <text x="824" y="304" fill="#FF7B72">jiko</text>
      <text x="888" y="304" fill="#C9D1D9">(a &gt; 1) {</text>

      <text x="858" y="340" fill="#D2A8FF">cetak</text>
      <text x="936" y="340" fill="#A5D6FF">("gadang");</text>

      <text x="824" y="376" fill="#C9D1D9">}</text>
      <text x="846" y="376" fill="#FF7B72">indak</text>
      <text x="928" y="376" fill="#C9D1D9">{</text>

      <text x="858" y="412" fill="#D2A8FF">cetak</text>
      <text x="936" y="412" fill="#A5D6FF">("ketek");</text>

      <text x="824" y="448" fill="#C9D1D9">}</text>

      <text x="824" y="492" fill="#FF7B72">salamo</text>
      <text x="930" y="492" fill="#C9D1D9">(a &lt; 3) { ... }</text>
    </g>
    <!-- prompt blink -->
    <rect x="824" y="508" width="14" height="22" fill="#3FB950"/>
  </g>
</svg>
